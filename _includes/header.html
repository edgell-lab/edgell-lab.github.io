<header class="site-header">
  <div class="header-inner">
    <div class="header-left">
      <a href="{{ '/' | relative_url }}" class="site-title">
        <span class="lab-name">the edgell lab</span>
        <span class="lab-subtitle">gene editing &amp; synthetic biology</span>
      </a>
    </div>
    <div class="header-right">
      <div class="header-logos">
        <img src="{{ '/assets/images/Schulich_horizontal_CMYK.png' | relative_url }}" alt="Schulich Medicine & Dentistry" class="affil-logo affil-logo--invert" />
        <img src="{{ '/assets/images/Horizontal_Full_Rev.png' | relative_url }}" alt="Western University" class="affil-logo" />
      </div>
      <div class="header-social">
        <a href="https://twitter.com/EdgellLab" target="_blank" aria-label="Twitter">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="#1da1f2"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.748l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </a>
      </div>
    </div>
  </div>
  <nav class="site-nav">
    <ul>
      {% for item in site.nav_pages %}
      <li>
        <a href="{{ item.url | relative_url }}"
           class="{% if page.url == item.url %}active{% endif %}">
          {{ item.title }}
        </a>
      </li>
      {% endfor %}
    </ul>
  </nav>
</header>
